<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- viewport (onde ele define por padrão a largura do site) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Descrição do site - SEO e compartilhamento -->
    <meta name="description"
        content="SintoniaWeb: agência de desenvolvimento de sites criada por 4 estudantes do SENAC, focada em soluções modernas, responsivas e profissionais.">

    <!-- Palavras Chave -->
    <meta name="keywords" content="criação de sites, desenvolvimento web, agência digital, sites responsivos, criação de sites São Paulo, desenvolvimento de sites profissionais, landing page, UX UI, SEO, SintoniaWeb">

    <!-- Autor do Site -->
    <meta name="author" content="Agência 1 - Senac SMP">

    <!-- Open Graph (Compartilhar nas Redes Sociais) -->
    <meta property="og:title" content="SintoniaWeb">
    <meta property="og:description"
        content="A SintoniaWeb é uma agência de desenvolvimento de sites formada por 4 estudantes do SENAC. Criamos sites modernos, responsivos e personalizados para empresas que querem crescer no digital.">
    <meta property="og:image" content="https://">
    <meta property="og:type" content="website">

    <!-- Link dos icon para favicon -->
    
    <title>SintoniaWeb</title>

    <!-- o reset limpa os estilos do html então caso for colocar estilos, deixe ele em primeiro, pois se não ele limpa -->
    <link rel="stylesheet" href="css/reset.css">

    <!-- ANIMAÇÃO CARROCEL SLICK -->
    <link rel="stylesheet" href="css/slick.css">
    <link rel="stylesheet" href="css/slick-theme.css">

    <!-- ANIAMAÇÃO - ANIAMTE CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- aplica estilo no html então ele sempre vem por ultimo, caso for aplicar estilos no css, pois se não -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsivo.css">
    
</head>
<body>
 
 <!-- CONTEÚDO -->
 <main>
     <h1>Hello Word!</h1>
 </main>



 <!-- RODAPÉ -->
 <footer>
 </footer>







    <!-- JQUARY -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <!-- É para a animação do carrocel do SLICK => Banner -->
    <script src="js/slick.min.js"></script>

    <!-- animação wow -->
    <script src="js/wow.min.js"></script>

    <!-- MEU SCRIPT (ANIMAÇÃO) -->
    <script src="js/script.js"></script>

</body>
</html>
